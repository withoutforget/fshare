[postgres]
host     = "localhost"
port     = 5432
user     = "myuser"
password = "secret"
database = "mydb"
ssl_mode = "disable"
max_conns = 10
min_conns = 2

[http]
host               = "localhost"
port               = 8080
allow_origins      = ["*"]
allow_methods      = ["*"]
allow_headers      = ["Content-Type", "Authorization"]
allow_credentials  = true
max_age_secs       = 3600

[logger]
level = "debug"
json  = false