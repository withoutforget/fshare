[postgres]
host     = "localhost"
port     = 5432
user     = "postgres"
password = "postgres"
database = "postgres"
ssl_mode = "disable"
max_conns = 10
min_conns = 2

[http]
host               = "localhost"
port               = 8080
allow_origins      = ["*"]
allow_methods      = ["*"]
allow_headers      = ["Content-Type", "Authorization"]
allow_credentials  = true
max_age_secs       = 3600

[logger]
level = "debug"
json  = false

[s3]
endpoint         = "localhost:9000"
access_key_id    = "rustfsadmin"
secret_access_key = "rustfsadmin"
bucket           = "fshare"
use_ssl          = false
region           = "us-east-1"